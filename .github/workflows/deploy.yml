name: Deploy — ecssingrb3

on:
  workflow_dispatch:

env:
  ACTIONS_RUNNER_FORCED_INTERNAL_NODE_VERSION: node24
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt || true
      - run: pytest --tb=short -q 2>/dev/null || echo "No tests found"

  build_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag:     ${{ steps.meta.outputs.image_tag }}
      project_lower: ${{ steps.meta.outputs.project_lower }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
      - name: Login to ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Sanitize project name for ECR
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.login_ecr.outputs.registry }}"
          IMAGE_TAG="${{ github.sha }}"
          # Lowercase, replace non-alphanumeric/hyphen with -, collapse and trim -
          PROJECT_NAME=$(echo "${{ secrets.PROJECT_NAME }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//; s/-$//')
          echo "image_tag=${ECR_REGISTRY}/${PROJECT_NAME}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "project_lower=${PROJECT_NAME}" >> $GITHUB_OUTPUT
      - name: Ensure ECR repository exists
        run: |
          # Create repo only if it does not already exist — idempotent, never fails
          if aws ecr describe-repositories \
               --repository-names "${{ steps.meta.outputs.project_lower }}" \
               --region "${{ secrets.AWS_REGION }}" > /dev/null 2>&1; then
            echo "ECR repo '${{ steps.meta.outputs.project_lower }}' already exists — skipping create"
          else
            echo "Creating ECR repo '${{ steps.meta.outputs.project_lower }}'..."
            aws ecr create-repository \
              --repository-name "${{ steps.meta.outputs.project_lower }}" \
              --image-tag-mutability MUTABLE \
              --region "${{ secrets.AWS_REGION }}"
            echo "ECR repo created"
          fi
      - name: Build & push Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.image_tag }} .
          docker push ${{ steps.meta.outputs.image_tag }}

  deploy:
    name: Deploy to ECS (Terraform)
    runs-on: ubuntu-latest
    needs: build_push
    outputs:
      url:          ${{ steps.alb.outputs.url }}
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}
      service_name: ${{ steps.tf_outputs.outputs.service_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
      - name: Resolve image tag
        id: resolve_image
        run: |
          # Reconstruct the image tag here — do not rely on cross-job outputs,
          # which can silently be empty in GitHub Actions.
          ECR_REGISTRY=$(aws ecr describe-registry \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'registryId' --output text)
          ECR_REGISTRY="${ECR_REGISTRY}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

          PROJECT_NAME=$(echo "${{ secrets.PROJECT_NAME }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//; s/-$//')

          IMAGE_TAG="${{ github.sha }}"
          FULL_IMAGE="${ECR_REGISTRY}/${PROJECT_NAME}:${IMAGE_TAG}"

          echo "image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "Resolved image: $FULL_IMAGE"

          # Verify the image actually exists in ECR before deploying
          aws ecr describe-images \
            --repository-name "$PROJECT_NAME" \
            --image-ids imageTag="$IMAGE_TAG" \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'imageDetails[0].imageDigest' --output text || {
            echo "ERROR: Image $FULL_IMAGE not found in ECR — did build_push complete successfully?"
            exit 1
          }
      - name: Create S3 state bucket
        run: |
          aws s3 mb s3://${{ secrets.TF_STATE_BUCKET }} \
            --region ${{ secrets.AWS_REGION }} 2>/dev/null || true
      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"
      - name: Terraform apply
        working-directory: terraform
        env:
          # Resolved locally — no cross-job output dependency
          TF_VAR_container_image:   ${{ steps.resolve_image.outputs.image }}
          # app_port is baked into main.tf at generation time — do NOT pass TF_VAR_app_port
          # here because an empty secret would fail Terraform's number type validation
          # Database / external secrets — injected into ECS task environment
          TF_VAR_database_url:      ${{ secrets.DATABASE_URL }}
          TF_VAR_db_host:           ${{ secrets.DB_HOST }}
          TF_VAR_db_port:           ${{ secrets.DB_PORT }}
          TF_VAR_db_name:           ${{ secrets.DB_NAME }}
          TF_VAR_db_username:       ${{ secrets.DB_USER }}
          TF_VAR_db_password:       ${{ secrets.DB_PASSWORD }}
          TF_VAR_mongo_uri:         ${{ secrets.MONGO_URI }}
          TF_VAR_redis_url:         ${{ secrets.REDIS_URL }}
          TF_VAR_secret_key:        ${{ secrets.SECRET_KEY }}
          TF_VAR_jwt_secret:        ${{ secrets.JWT_SECRET }}
          TF_VAR_spring_datasource_url:  ${{ secrets.SPRING_DATASOURCE_URL }}
          TF_VAR_spring_datasource_user: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          TF_VAR_spring_datasource_pass: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          TF_VAR_spring_mongodb_uri:     ${{ secrets.SPRING_DATA_MONGODB_URI }}
          # RDS credentials (used only when install_db == rds)
          TF_VAR_rds_db_name:       ${{ secrets.DB_NAME }}
          TF_VAR_rds_db_username:   ${{ secrets.DB_USER }}
          TF_VAR_rds_db_password:   ${{ secrets.DB_PASSWORD }}
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}"
      - name: Force ECS service to use new task definition
        run: |
          PROJECT_NAME="${{ secrets.PROJECT_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"
          # Get the latest task definition ARN for this family (just created by terraform apply)
          TASK_DEF_ARN=$(aws ecs describe-task-definition \
            --task-definition "$PROJECT_NAME" \
            --region "$REGION" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text 2>/dev/null || echo "")
          if [ -z "$TASK_DEF_ARN" ]; then
            echo "Could not resolve task definition ARN — skipping force deploy"
          else
            # Resolve cluster/service names using the same naming logic as Terraform
            NAME_SAFE=$(echo "$PROJECT_NAME" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/_/-/g' \
              | cut -c1-24 \
              | sed 's/-$//')
            CLUSTER="${NAME_SAFE}-cluster"
            SERVICE="${NAME_SAFE}-service"
            echo "Updating ECS service '$SERVICE' in cluster '$CLUSTER' to task def: $TASK_DEF_ARN"
            aws ecs update-service \
              --cluster "$CLUSTER" \
              --service "$SERVICE" \
              --task-definition "$TASK_DEF_ARN" \
              --force-new-deployment \
              --region "$REGION" \
              --query 'service.serviceArn' --output text
          fi
      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform